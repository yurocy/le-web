version: '3.8'

services:
  le-go:
    build: .
    container_name: le-go-server
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
      - ./uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - mysql
      - redis
    networks:
      - le-network

  mysql:
    image: mysql:8.0
    container_name: le-go-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: lehuiso826
      MYSQL_DATABASE: le_app
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - le-network

  redis:
    image: redis:7-alpine
    container_name: le-go-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - le-network

  nginx:
    image: nginx:alpine
    container_name: le-go-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - le-go
    networks:
      - le-network

volumes:
  mysql-data:
  redis-data:

networks:
  le-network:
    driver: bridge
